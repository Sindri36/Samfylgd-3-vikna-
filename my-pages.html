<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samfylgd – Mínar síður</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <a class="logo" href="front-page.html">Samfylgd</a>
  <nav>
    <button onclick="window.location.href='front-page.html'" id="logoutBtn">Skrá út</button>
  </nav>
</header>

<main>
  <div class="hero">
    <h1>Mínar síður</h1>
    <p>Veldu þjónustu til að halda áfram.</p>
  </div>

  <div class="cards cards--four">
    <button class="card card--btn" onclick="window.location.href='folder.html'">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        </svg>
      </div>
      <h3>Mappa barnsins</h3>
      <p>Stafræn mappa með upplýsingum um barnið — fylltu eins mikið eða lítið út og þú vilt.</p>
    </button>
    <button class="card card--btn" onclick="window.location.href='prescription.html'">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.5 20.5 3.5 13.5a4.95 4.95 0 0 1 7-7l7 7a4.95 4.95 0 0 1-7 7Z"/>
          <path d="m8.5 8.5 7 7"/>
        </svg>
      </div>
      <h3>Lyfseðlar</h3>
      <p>Skoðaðu og endurnýjaðu lyfseðla þína.</p>
    </button>
    <button class="card card--btn" onclick="window.location.href='doctor-appointments.html'">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4.5 3v6a3.5 3.5 0 0 0 7 0V3"/>
          <path d="M3.5 3h2"/>
          <path d="M10.5 3h2"/>
          <path d="M8 12.5v3a4.5 4.5 0 0 0 9 0v-3"/>
          <circle cx="19" cy="11" r="2"/>
        </svg>
      </div>
      <h3>Læknatímar</h3>
      <p>Bókaðu eða breyttu læknatíma.</p>
    </button>
    <button class="card card--btn" onclick="window.location.href='rights.html'">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="6" y="4" width="12" height="17" rx="2"/>
          <path d="M9 4v-1a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1"/>
          <path d="M9 11h6"/>
          <path d="M9 15h4"/>
        </svg>
      </div>
      <h3>Réttindi</h3>
      <p>Yfirlit yfir heilbrigðisréttindi þín.</p>
    </button>
    <button class="card card--btn" onclick="window.location.href='insurance.html'">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <path d="m9 12 2 2 4-4"/>
        </svg>
      </div>
      <h3>Tryggingar</h3>
      <p>Skoðaðu tryggingavernd og greiðslur.</p>
    </button>
    <!--
    <button class="card card--btn" onclick="window.location.href='compensation.html'">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 6h6l1.5-3h-9z"/>
          <path d="M9 6c-3 1.5-5 5.5-5 9 0 3 2 6 5 6h6c3 0 5-3 5-6 0-3.5-2-7.5-5-9"/>
          <text x="12" y="16" font-size="5.5" font-family="-apple-system, sans-serif" font-weight="700" text-anchor="middle" stroke="none" fill="currentColor">kr</text>
        </svg>
      </div>
      <h3>Bætur</h3>
      <p>Yfirlit yfir bætur sem þú átt rétt á og endurnýjun.</p>
    </button>
    -->
    <button class="card card--btn" onclick="window.location.href='certificates.html'">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/>
          <path d="M14 3v5h5"/>
          <path d="M9 13h6"/>
          <path d="M9 17h6"/>
        </svg>
      </div>
      <h3>Vottorð</h3>
      <p>Læknis- og örorkuvottorð og umsóknir um endurnýjun.</p>
    </button>
    <button class="card card--btn" onclick="window.location.href='calendar.html'">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="5" width="16" height="16" rx="2"/>
          <path d="M4 10h16"/>
          <path d="M8 3v4"/>
          <path d="M16 3v4"/>
        </svg>
      </div>
      <h3>Dagatal</h3>
      <p>Yfirlit yfir læknatíma og dagsetningar fyrir endurnýjun.</p>
    </button>
    <button class="card card--btn" onclick="window.location.href='review.html'">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8"/>
          <path d="M14 3v5h5"/>
          <path d="m17 11 4 4-5 5h-4v-4z"/>
        </svg>
      </div>
      <h3>Umsókn</h3>
      <p>Umsókn um umönnunarbætur — fylltu út og sendu inn.</p>
    </button>
  </div>
</main>

</body>
</html>
