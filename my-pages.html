<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samfylgd – Mínar síður</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <a class="logo" href="front-page.html">Samfylgd</a>
  <nav>
    <button onclick="window.location.href='front-page.html'" id="logoutBtn">Skrá út</button>
  </nav>
</header>

<main>
  <div class="hero">
    <h1>Mínar síður</h1>
    <p>Veldu þjónustu til að halda áfram.</p>
  </div>

  <div class="cards">
    <button class="card card--btn" onclick="window.location.href='folder.html'">
      <div class="card-icon">📁</div>
      <h3>Mappa barnsins</h3>
      <p>Stafræn mappa með upplýsingum um barnið — fylltu eins mikið eða lítið út og þú vilt.</p>
    </button>
    <button class="card card--btn" onclick="window.location.href='calendar.html'">
      <div class="card-icon">📅</div>
      <h3>Dagatal</h3>
      <p>Yfirlit yfir tímabókanir og dagsetningar fyrir endurnýjun.</p>
    </button>
    <button class="card card--btn" onclick="window.location.href='prescription.html'">
      <div class="card-icon">💊</div>
      <h3>Lyfseðlar</h3>
      <p>Skoðaðu og endurnýjaðu lyfseðla þína.</p>
    </button>
    <button class="card card--btn" onclick="window.location.href='doctor-appointments.html'">
      <div class="card-icon">🩺</div>
      <h3>Tímabókun</h3>
      <p>Bókaðu eða breyttu tímabókun.</p>
    </button>
    <button class="card card--btn" onclick="window.location.href='rights.html'">
      <div class="card-icon">📋</div>
      <h3>Réttindi</h3>
      <p>Yfirlit yfir heilbrigðisréttindi þín.</p>
    </button>
    <button class="card card--btn" onclick="window.location.href='insurance.html'">
      <div class="card-icon">🛡️</div>
      <h3>Tryggingar</h3>
      <p>Skoðaðu tryggingavernd og greiðslur.</p>
    </button>
    <button class="card card--btn" onclick="window.location.href='compensation.html'">
      <div class="card-icon">💰</div>
      <h3>Bætur</h3>
      <p>Yfirlit yfir bætur sem þú átt rétt á og endurnýjun.</p>
    </button>
    <button class="card card--btn" onclick="window.location.href='certificates.html'">
      <div class="card-icon">📄</div>
      <h3>Vottorð</h3>
      <p>Læknis- og örorkuvottorð og umsóknir um endurnýjun.</p>
    </button>
    <button class="card card--btn" onclick="window.location.href='review.html'">
      <div class="card-icon">📝</div>
      <h3>Umsókn</h3>
      <p>Umsókn um umönnunarbætur — fylltu út og sendu inn.</p>
    </button>
  </div>
</main>

</body>
</html>
