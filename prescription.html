<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samfylgd – Lyfseðlar</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <a class="logo" href="front-page.html">Samfylgd</a>
  <nav>
    <button onclick="window.location.href='my-pages.html'">Mínar síður</button>
    <button class="primary" onclick="window.location.href='front-page.html'">Skrá út</button>
  </nav>
</header>

<main>
  <div class="hero">
    <h1>Lyfseðlar</h1>
    <p>Yfirlit yfir virka lyfseðla þína.</p>
  </div>

  <div class="table-wrapper">
    <table class="rx-table" id="rxTable">
      <thead>
        <tr>
          <th>Lyf</th>
          <th>Seðilsnúmer</th>
          <th>Gildistími</th>
          <th>Sækja um endurnýjun</th>
        </tr>
      </thead>
      <tbody id="rxBody"></tbody>
    </table>
  </div>
</main>

<!-- ── Renewal modal ── -->
<div class="modal-overlay" id="renewModal">
  <div class="modal">
    <button class="close" id="renewClose" aria-label="Loka">×</button>
    <h2 id="renewTitle">Endurnýja lyfseðil</h2>
    <p class="sub" id="renewSub">Skráðu lækni eða stofnun til að hafa samband við.</p>

    <div id="renewSaved" class="renew-saved" style="display:none;">
      <div class="renew-saved-row">
        <span class="renew-label">Læknir / stofnun</span>
        <span class="renew-value" id="renewSavedName"></span>
      </div>
      <div class="renew-saved-row">
        <span class="renew-label">Símanúmer</span>
        <a class="renew-value renew-phone" id="renewSavedPhone" href="#"></a>
      </div>
      <div class="renew-actions">
        <button type="button" class="btn-secondary" id="renewEdit">Breyta</button>
        <button type="button" class="btn-danger" id="renewDelete">Eyða</button>
      </div>
    </div>

    <form id="renewForm" class="renew-form">
      <div class="form-group">
        <label for="renewName">Nafn læknis eða stofnunar</label>
        <input type="text" id="renewName" placeholder="t.d. Heilsugæslan Garðabæ" required>
      </div>
      <div class="form-group">
        <label for="renewPhone">Símanúmer</label>
        <input type="tel" id="renewPhone" placeholder="t.d. 555 1234" required>
      </div>
      <p class="error" id="renewError">Vinsamlegast fylltu út bæði nafn og símanúmer.</p>
      <button type="submit" class="submit-btn">Vista</button>
    </form>
  </div>
</div>

<script src="js/prescription.js"></script>
</body>
</html>
